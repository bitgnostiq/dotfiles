config-version = 2

# ---  Startup Behavior ---
start-at-login = true
after-login-command = []
after-startup-command = []
auto-reload-config = true

# --- Normalization & Layouts ---
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 0

# --- Focus & Mouse Behavior ---
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
focus-follows-mouse.enabled = false
on-mode-changed = []

automatically-unhide-macos-hidden-apps = false


persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

# --- Window Gaps (pixels) ---
[gaps]
inner.horizontal = 0
inner.vertical =   0

outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0

# --- Key Mapping ---
[key-mapping]
preset = 'qwerty'

# --- Main Mode Keybindings ---
[mode.main.binding]
alt-enter = 'exec-and-forget open -a kitty'

# Window Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'


# Move Windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Layout ---

# Layout Shortcuts
alt-slash = 'layout accordion horizontal vertical'
alt-backslash = 'layout tiles horizontal vertical'
alt-f = 'fullscreen'
alt-0 = 'balance-sizes'
alt-shift-0 = 'flatten-workspace-tree'

# Floating
alt-shift-space = 'layout floating tiling'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Workspaces ---

# Workspace shortcuts (switch to workspace 1–10)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move windows to specific workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'


# Ctrl + workspace combo: move window and switch workspace
alt-ctrl-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-ctrl-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-ctrl-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-ctrl-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-ctrl-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-ctrl-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-ctrl-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-ctrl-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-ctrl-9 = ['move-node-to-workspace 9', 'workspace 9']


# Workspace back-and-forth
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


alt-shift-m = 'mode manage'

# --- Manage Mode Keybindings ---
[mode.manage.binding]
esc = 'mode main'
enter = 'mode main'
c = ['reload-config', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']


# Join windows
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']
