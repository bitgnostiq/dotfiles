config-version = 2

# ---  Startup Behavior ---
start-at-login = true
after-login-command = []
after-startup-command = []
auto-reload-config = true

# --- Normalization & Layouts ---
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 0

# --- Focus & Mouse Behavior ---
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
focus-follows-mouse.enabled = false
on-mode-changed = []

automatically-unhide-macos-hidden-apps = false


persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

# --- Window Gaps (pixels) ---
[gaps]
inner.horizontal = 0
inner.vertical =   0

outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0

# --- Key Mapping ---
[key-mapping]
preset = 'qwerty'

# --- Main Mode Keybindings ---
[mode.main.binding]
cmd-enter = 'exec-and-forget open -a kitty'

# Window Focus
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'


# Move Windows
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# --- Layout ---

# Layout Shortcuts
cmd-slash = 'layout accordion horizontal vertical'
cmd-backslash = 'layout tiles horizontal vertical'
cmd-0 = 'balance-sizes'
cmd-shift-0 = 'flatten-workspace-tree'

cmd-shift-f = 'macos-native-fullscreen'
cmd-e = 'macos-native-minimize'
cmd-f = 'fullscreen'


# Floating
cmd-shift-space = 'layout floating tiling'

# Resize
cmd-minus = 'resize smart -50'
cmd-equal = 'resize smart +50'

# --- Workspaces ---

# Workspace shortcuts (switch to workspace 1–10)
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move windows to specific workspaces
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'


# Ctrl + workspace combo: move window and switch workspace
cmd-ctrl-1 = ['move-node-to-workspace 1', 'workspace 1']
cmd-ctrl-2 = ['move-node-to-workspace 2', 'workspace 2']
cmd-ctrl-3 = ['move-node-to-workspace 3', 'workspace 3']
cmd-ctrl-4 = ['move-node-to-workspace 4', 'workspace 4']
cmd-ctrl-5 = ['move-node-to-workspace 5', 'workspace 5']
cmd-ctrl-6 = ['move-node-to-workspace 6', 'workspace 6']
cmd-ctrl-7 = ['move-node-to-workspace 7', 'workspace 7']
cmd-ctrl-8 = ['move-node-to-workspace 8', 'workspace 8']
cmd-ctrl-9 = ['move-node-to-workspace 9', 'workspace 9']


# Workspace back-and-forth
cmd-tab = 'workspace-back-and-forth'
cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'


cmd-shift-m = 'mode manage'

# --- Manage Mode Keybindings ---
[mode.manage.binding]
esc = 'mode main'
enter = 'mode main'
c = ['reload-config', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']


# Join windows
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']


# --- Application-specific Rules ---
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']
